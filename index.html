<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logic Gate Adder Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <h1>Logic Gate Adder Exhibit</h1>
        <p>
          Pick two numbers, watch their binary forms, then zoom into the chip to see
          how electricity flows through real logic gates.
        </p>
      </header>

      <section class="panel controls" aria-label="Input controls">
        <div class="input-cluster">
          <label for="inputA">Input A</label>
          <input id="inputA" type="number" min="0" max="255" value="5" />
          <div class="tube-display" id="binaryA">00000101</div>
        </div>
        <div class="input-cluster">
          <label for="inputB">Input B</label>
          <input id="inputB" type="number" min="0" max="255" value="3" />
          <div class="tube-display" id="binaryB">00000011</div>
        </div>

        <div class="actions">
          <button id="goBtn" class="go">GO</button>
          <button id="resetBtn" class="ghost">Reset</button>
        </div>
      </section>

      <section class="panel ticker" aria-label="Result ticker">
        <div>
          <h2>Decimal Result</h2>
          <div id="decimalResult" class="tube-display large">8</div>
        </div>
        <div>
          <h2>Binary Result</h2>
          <div id="binaryResult" class="tube-display large">00001000</div>
        </div>
      </section>

      <section class="panel stage" aria-label="Chip animation stage">
        <div id="overviewScene" class="scene overview active" aria-hidden="false">
          <div class="chip-icon">
            <div class="chip-core">ALU</div>
            <span class="pin left"></span>
            <span class="pin right"></span>
            <span class="pin top"></span>
            <span class="pin bottom"></span>
          </div>
          <p>Press GO to zoom inside and trace the addition circuit.</p>
        </div>

        <div id="insideScene" class="scene inside" aria-hidden="true">
          <svg viewBox="0 0 900 380" role="img" aria-label="4-bit ripple carry adder">
            <defs>
              <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
                <feGaussianBlur stdDeviation="2.5" result="blur" />
                <feMerge>
                  <feMergeNode in="blur" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
            </defs>

            <!-- A and B input buses -->
            <line id="wire-a-bus" class="wire" x1="60" y1="80" x2="820" y2="80" />
            <line id="wire-b-bus" class="wire" x1="60" y1="140" x2="820" y2="140" />

            <!-- Carry baseline -->
            <line id="wire-carry-base" class="wire" x1="60" y1="260" x2="130" y2="260" />

            <!-- 4 full adder cells -->
            <g class="adder-cell" transform="translate(130,40)">
              <rect id="gate-fa-0" class="gate" x="0" y="40" width="140" height="160" rx="16" />
              <text x="70" y="125" text-anchor="middle">FA0 (LSB)</text>
              <line id="wire-a-0" class="wire" x1="-70" y1="40" x2="0" y2="40" />
              <line id="wire-b-0" class="wire" x1="-70" y1="100" x2="0" y2="100" />
              <line id="wire-cin-0" class="wire" x1="-70" y1="220" x2="0" y2="160" />
              <line id="wire-sum-0" class="wire" x1="140" y1="90" x2="190" y2="90" />
              <line id="wire-cout-0" class="wire" x1="140" y1="170" x2="190" y2="220" />
            </g>

            <g class="adder-cell" transform="translate(300,40)">
              <rect id="gate-fa-1" class="gate" x="0" y="40" width="140" height="160" rx="16" />
              <text x="70" y="125" text-anchor="middle">FA1</text>
              <line id="wire-a-1" class="wire" x1="-70" y1="40" x2="0" y2="40" />
              <line id="wire-b-1" class="wire" x1="-70" y1="100" x2="0" y2="100" />
              <line id="wire-cin-1" class="wire" x1="-70" y1="220" x2="0" y2="160" />
              <line id="wire-sum-1" class="wire" x1="140" y1="90" x2="190" y2="90" />
              <line id="wire-cout-1" class="wire" x1="140" y1="170" x2="190" y2="220" />
            </g>

            <g class="adder-cell" transform="translate(470,40)">
              <rect id="gate-fa-2" class="gate" x="0" y="40" width="140" height="160" rx="16" />
              <text x="70" y="125" text-anchor="middle">FA2</text>
              <line id="wire-a-2" class="wire" x1="-70" y1="40" x2="0" y2="40" />
              <line id="wire-b-2" class="wire" x1="-70" y1="100" x2="0" y2="100" />
              <line id="wire-cin-2" class="wire" x1="-70" y1="220" x2="0" y2="160" />
              <line id="wire-sum-2" class="wire" x1="140" y1="90" x2="190" y2="90" />
              <line id="wire-cout-2" class="wire" x1="140" y1="170" x2="190" y2="220" />
            </g>

            <g class="adder-cell" transform="translate(640,40)">
              <rect id="gate-fa-3" class="gate" x="0" y="40" width="140" height="160" rx="16" />
              <text x="70" y="125" text-anchor="middle">FA3 (MSB)</text>
              <line id="wire-a-3" class="wire" x1="-70" y1="40" x2="0" y2="40" />
              <line id="wire-b-3" class="wire" x1="-70" y1="100" x2="0" y2="100" />
              <line id="wire-cin-3" class="wire" x1="-70" y1="220" x2="0" y2="160" />
              <line id="wire-sum-3" class="wire" x1="140" y1="90" x2="190" y2="90" />
              <line id="wire-cout-3" class="wire" x1="140" y1="170" x2="190" y2="220" />
            </g>

            <!-- Output collection -->
            <line id="wire-sum-bus" class="wire" x1="320" y1="320" x2="830" y2="320" />
            <line id="wire-final-carry" class="wire" x1="830" y1="260" x2="830" y2="320" />
            <text x="40" y="84">A bus</text>
            <text x="40" y="144">B bus</text>
            <text x="40" y="264">Carry in</text>
            <text x="760" y="344">SUM bus</text>
          </svg>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
